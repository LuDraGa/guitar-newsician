# Stem Separator Configuration

# Input directory containing song directories with audio.wav files
# Each song directory should have an audio.wav file
input_dir: downloads

# Output settings - stems will be saved in <song_dir>/stems/
# Available models:
#   - htdemucs: 4 sources (vocals, drums, bass, other)
#   - htdemucs_ft: Fine-tuned 4 sources
#   - htdemucs_6s: 6 sources (vocals, drums, bass, other, piano, guitar)
model: htdemucs_6s

# Processing settings
segment: 7.8          # Segment size in seconds (None = auto, typically 7.8s for htdemucs)
overlap: 0.25         # Overlap between segments (0.0-0.99)
shifts: 1             # Test-time augmentation shifts (higher = better quality but slower)

# Device settings
# Options: auto, cuda, cpu
device: auto

# Precision settings
# Options: float32, float16 (fp16 only works with CUDA)
dtype: float32

# Output format
# Options: wav, flac
codec: wav

# Supported input formats (for batch processing)
audio_exts:
  - wav
  - mp3
  - flac
  - ogg
  - m4a
  - aac

# Processing options
skip_existing: true   # Skip songs that already have stems directory
overwrite: false      # Overwrite existing stems within stems directory
