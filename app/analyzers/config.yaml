# Music Analysis Configuration

# Input directory containing song directories
# Each song directory should have an audio.wav file or stems directory
input_dir: downloads

# Processing settings
skip_existing: true
workers: 4

# Analyzer filtering (null = run all)
enable_analyzers: null  # e.g., ["basic_stats", "tempo_beats", "tonal_key"]
disable_analyzers: null  # e.g., ["structure_msaf"]

# Dashboard display settings
show_dashboard: true
max_chords: 10
max_beats: 10
max_sections: 10

# Analysis output naming:
# - Base audio: analysis.json
# - Individual stems: analysis_<stem_name>.json (e.g., analysis_vocals.json)
