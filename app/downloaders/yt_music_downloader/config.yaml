# Download directory (each song gets its own subdirectory)
download_dir: downloads

# Filename template - uses title as directory name (limited to 70 chars)
# Use %(id)s instead of %(title).70s if you prefer video ID as folder name
filename_template: '%(title).70s/audio.%(ext)s'

# Audio settings
audio_format: m4a
audio_quality: '320'

# Network settings
rate_limit: ''
proxy: ''

# Metadata and processing
embed_metadata: true
prefer_free_formats: false
noplaylist: true

# Subtitle/lyrics settings
# When enabled, fetches synced lyrics from YouTube Music API (saves as lyrics.lrc)
# Also attempts to download standard YouTube subtitles if available
download_subtitles: true
subtitle_format: vtt
subtitle_langs:
  - en
  - en-US
  - en-GB

# Metadata file creation
create_metadata: true

# Browser cookies and client settings
use_cookies_from_browser: null
cookiefile: null
yt_player_client: web
user_agent: null
ytdlp_extra: {}
